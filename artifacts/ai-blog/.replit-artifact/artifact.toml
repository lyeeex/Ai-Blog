kind = "web"
previewPath = "/"
title = "AI Blog | مدونة الذكاء الاصطناعي"
version = "1.0.0"
id = "artifacts/ai-blog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20050

[services.development]
run = "pnpm --filter @workspace/ai-blog run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-blog", "run", "build" ]
publicDir = "artifacts/ai-blog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20050"
BASE_PATH = "/"
